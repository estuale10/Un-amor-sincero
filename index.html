<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Un pequeño mensaje</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}

.box{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
max-width:500px;
}

h1{
color:#7dd3fc;
}

button{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:20px;
background:#7dd3fc;
color:black;
cursor:pointer;
}

.extra{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<h1>hola 😊</h1>

<p>
entre tantas personas en el mundo,<br>
me alegra haber coincidido contigo.
</p>

<button onclick="mostrar()">ver otro mensaje ✨</button>

<div class="extra" id="mensaje">
<p>
a veces una conversación sencilla<br>
puede alegrar mucho el día 🌷
</p>
</div>

</div>

<script>
function mostrar(){
document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>
