<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>un pequeño mensaje</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
margin:0;
}

.box{
background:rgba(255,255,255,0.06);
padding:40px;
border-radius:20px;
max-width:600px;
}

h1{
color:#ff7aa2;
font-size:36px;
}

p{
font-size:20px;
line-height:1.6;
}

.extra{
margin-top:20px;
display:none;
font-size:18px;
color:#ffd1dc;
}

button{
margin-top:25px;
padding:12px 20px;
border:none;
border-radius:20px;
background:#ff7aa2;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h1>hola 😊</h1>

<p>
no sé si fue coincidencia o destino,<br>
pero me alegra que hayas aparecido. ✨
</p>

<p>🌷🤍💫</p>

<button onclick="mostrar()">toca aquí 💌</button>

<div class="extra" id="mensaje">
a veces las mejores personas llegan<br>
cuando menos lo esperamos 🌸
</div>

</div>

<script>

function mostrar(){
document.getElementById("mensaje").style.display="block";
}

</script>

</body>
</html>
