<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Un pequeño detalle</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}

.box{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
max-width:520px;
}

img{
width:200px;
border-radius:15px;
margin-bottom:20px;
}

h1{
color:#7dd3fc;
}

button{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:20px;
background:#7dd3fc;
color:black;
cursor:pointer;
}

.extra{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<img src="foto.jpg">

<h1>hola 😊</h1>

<p>
a veces las mejores conexiones<br>
empiezan con una simple conversación.
</p>

<p>
me alegra poder conocerte<br>
poco a poco ✨
</p>

<button onclick="mostrar()">ver otro mensaje</button>

<div class="extra" id="mensaje">

<p>
lo bonito de conocerte<br>
es que cada día descubro algo nuevo 🌷
</p>

</div>

</div>

<script>

function mostrar(){
document.getElementById("mensaje").style.display="block";
}

</script>

</body>
</html>
